name: Accessibility scan

# Run from the Actions tab and enter the client's site URL.
on:
  workflow_dispatch:
    inputs:
      url:
        description: "Site URL (e.g. https://clientsite.com) — Yoast sitemap_index.xml is found automatically. A full sitemap URL also works."
        required: true
      name:
        description: "Friendly site name shown in the report (optional; defaults to the hostname)."
        required: false
      types:
        description: "Sitemap types to include (comma-separated). Add a custom post type here for the rare site that needs it."
        required: false
        default: "post,page"
      ux:
        description: "Also run the UX / layout scan (rendering + mobile-friendliness bugs)."
        required: false
        type: boolean
        default: true

permissions:
  contents: write   # commit normalized scan data back to the repo
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    env:
      # Add a repo secret REPORT_PASSWORD to password-protect the report.
      REPORT_PASSWORD: ${{ secrets.REPORT_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so we can rebase + push scan data back

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Discover pages from sitemap
        env:
          SCAN_URL: ${{ inputs.url }}
          SITEMAP_TYPES: ${{ inputs.types }}
        run: node scripts/discover-urls.js

      - name: Run accessibility scan
        # Use the npm script so node_modules/.bin is on PATH (a bare "pa11y-ci"
        # is not found in CI). pa11y-ci exits non-zero when it finds issues,
        # which is normal, so the script swallows that — we validate the output
        # in the next step instead.
        run: npm run scan

      - name: Check the scan produced results
        run: |
          if ! node -e 'JSON.parse(require("fs").readFileSync("results.json","utf8"))' 2>/dev/null; then
            echo "::error::Scan produced no valid results.json — pa11y-ci failed to run (often a Chromium launch issue on the runner)."
            echo "----- results.json (first 400 bytes) -----"
            head -c 400 results.json || true
            echo
            exit 1
          fi
          echo "results.json is valid."

      - name: Normalize results into committed data
        env:
          SCAN_URL: ${{ inputs.url }}
          SITE_NAME: ${{ inputs.name }}
        run: node scripts/ingest-results.js

      # UX / layout scan — reuses run-config.json's URLs and the Chromium that
      # `npm install` already provisioned for pa11y's puppeteer, so no extra
      # browser-install step is needed. Runs before the commit so its normalized
      # data (data/<slug>/ux-*.json) is committed alongside the a11y data.
      # continue-on-error so a UX hiccup (or the broken-scan guard's refusal to
      # overwrite good data) never blocks committing + deploying the a11y results
      # that follow — the report just falls back to an a11y-only lens.
      - name: Run UX & layout scan
        if: ${{ inputs.ux }}
        continue-on-error: true
        env:
          SCAN_URL: ${{ inputs.url }}
        run: node scripts/scan-ux.js

      - name: Normalize UX results into committed data
        if: ${{ inputs.ux }}
        continue-on-error: true
        env:
          SCAN_URL: ${{ inputs.url }}
          SITE_NAME: ${{ inputs.name }}
        run: node scripts/ingest-ux.js

      - name: Commit scan data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "No scan-data changes to commit."
          else
            git commit -m "scan: ${{ inputs.url }} ($(date -u +%Y-%m-%d))"
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi

      - name: Build HTML reports
        run: node scripts/build-report.js

      - name: Assemble site
        run: |
          mkdir -p public
          cp -r build/. public/
          printf 'User-agent: *\nDisallow: /\n' > public/robots.txt

      - name: Password-protect the report (optional)
        if: env.REPORT_PASSWORD != ''
        run: |
          # Encrypt every rendered page in place (landing + per-site reports).
          find public -name '*.html' -print0 | while IFS= read -r -d '' f; do
            npx --yes staticrypt "$f" -p "$REPORT_PASSWORD" -d "$(dirname "$f")"
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
